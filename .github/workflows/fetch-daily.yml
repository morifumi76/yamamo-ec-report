name: Daily Order Fetch

# 毎日 09:00 JST に前日分の注文データを取得して data/daily/YYYY-MM-DD.json をコミットする。
# 取得後、当月の archive/YYYY-MM.json を再生成して「月途中の途中経過レポート」を更新する（v1.4）。
# UTC 基準 0:00 が JST 9:00 に相当（cron: '0 0 * * *'）。
# 設計書 v1.4 §2 / §6 / §9 M8 に準拠。

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 JST
  workflow_dispatch:       # 手動再実行を許可

permissions:
  contents: write          # data/daily/ への push に必要

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        env:
          BASE_CLIENT_ID:     ${{ secrets.BASE_CLIENT_ID }}
          BASE_CLIENT_SECRET: ${{ secrets.BASE_CLIENT_SECRET }}
          BASE_REFRESH_TOKEN: ${{ secrets.BASE_REFRESH_TOKEN }}
        run: |
          cat > .env << ENVEOF
          BASE_CLIENT_ID=${BASE_CLIENT_ID}
          BASE_CLIENT_SECRET=${BASE_CLIENT_SECRET}
          BASE_REFRESH_TOKEN=${BASE_REFRESH_TOKEN}
          OAUTH_CALLBACK_PORT=8080
          ENVEOF

      - name: Fetch yesterday's orders
        run: python scripts/fetch_daily.py --force

      # BASE は refresh_token をローテーションするため、毎回返ってくる新トークンを
      # GitHub Secrets に書き戻して次回実行が成功するようにする。
      # 書き戻しに失敗したら次回実行が確実に失敗するため、ジョブも赤くする（exit 1）。
      # v1.5: fetch はトークンリフレッシュ成功「後」に失敗し得る（詳細取得エラー等）。
      #       その場合でも新トークンは .env に保存済みなので、if: always() で必ず書き戻す。
      #       （書き戻し漏れ＝使用済みトークンが Secrets に残り、翌日以降の認証が全滅する）
      - name: Update BASE_REFRESH_TOKEN secret if rotated
        if: always()
        env:
          GH_TOKEN:  ${{ secrets.REPO_PAT }}
          OLD_TOKEN: ${{ secrets.BASE_REFRESH_TOKEN }}
        run: |
          if [ ! -f .env ]; then
            echo "::notice::.env が存在しないためスキップします（.env 作成前に失敗した場合）。"
            exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::REPO_PAT が未設定です。refresh_token のローテーションに追従できず、次回実行が失敗します。"
            exit 1
          fi
          NEW=$(grep '^BASE_REFRESH_TOKEN=' .env | cut -d= -f2-)
          if [ -z "$NEW" ]; then
            echo "::error::.env から BASE_REFRESH_TOKEN を読めませんでした。"
            exit 1
          fi
          if [ "$NEW" = "$OLD_TOKEN" ]; then
            echo "refresh_token は変更なし"
            exit 0
          fi
          echo "::notice::refresh_token がローテーションされました。Secret を更新します。"
          # 注意: gh secret set の --body はリテラル文字列を取るため、`--body -` は
          # 「リテラル `-`（1文字）」を Secret に書き込んでしまう（2026-05-18 障害の原因）。
          # stdin から読ませる場合は --body を付けずに stdin パイプを使う。
          if ! printf '%s' "$NEW" | gh secret set BASE_REFRESH_TOKEN; then
            echo "::error::Secret 更新に失敗しました（gh secret set がエラー）。次回実行が確実に失敗するため、本ジョブも失敗扱いにします。"
            echo "::error::REPO_PAT の権限（Secrets: Read and write）と有効期限を確認してください。"
            exit 1
          fi
          echo "::notice::Secret 更新成功"

      - name: Remove .env (do not commit secrets)
        if: always()
        run: rm -f .env

      # v1.4: 日次取得後に当月の archive を再生成して「月途中レポート」を更新する。
      # AIコメントは月締め後（generate-monthly ジョブ）でのみ生成するため、ここでは --no-ai。
      # 月初（その月のdailyファイルがまだ無い）は空集計になりエラーするため、ファイル存在を先に確認する。
      - name: Regenerate current month archive (in-progress)
        run: |
          CURRENT_MONTH=$(TZ=Asia/Tokyo date +%Y-%m)
          if ls data/daily/${CURRENT_MONTH}-*.json >/dev/null 2>&1; then
            echo "Regenerating archive for current month: $CURRENT_MONTH"
            python scripts/generate_monthly.py --month "$CURRENT_MONTH" --no-ai --force
          else
            echo "::notice::data/daily/${CURRENT_MONTH}-*.json が無いため当月集計をスキップします"
          fi

      - name: Commit and push if data changed
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name  'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add data/daily/ data/archive/ data/months.json
            git commit -m "data: 日次データ自動取得＋当月集計 ($(TZ=Asia/Tokyo date -d '1 day ago' +%Y-%m-%d))"
            # v1.5: 他ジョブが先に push していた場合に備えて rebase してから push する
            git pull --rebase origin main
            git push
          else
            echo "::notice::データに変更なし、コミットをスキップします"
          fi
